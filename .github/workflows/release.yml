name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch: # manual trigger — useful for re-running without a fresh tag

permissions:
  contents: write # softprops/action-gh-release needs this to publish a Release

jobs:
  build:
    name: build-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_glob: |
              src-tauri/target/release/bundle/**/*.deb
              src-tauri/target/release/bundle/**/*.AppImage
          - os: macos-latest
            # Apple Silicon (arm64) — `macos-latest` has been ARM-only
            # since GH Actions switched the default runner in late 2024.
            # v0.2.6 release fix: dropped macos-13 (Intel x64) entry.
            # Rationale: project policy is Apple-Silicon-only; Intel
            # Macs are out of support since Apple stopped selling them
            # in 2020. Keeping the matrix entry meant relying on
            # `macos-13` runners, which are capacity-starved and
            # frequently stall CI for hours.
            artifact_glob: |
              src-tauri/target/release/bundle/**/*.dmg
          - os: windows-latest
            artifact_glob: |
              src-tauri/target/release/bundle/**/*.msi
              src-tauri/target/release/bundle/**/*.exe

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          # Node 22 LTS — Node 24 is what GH Actions currently forces
          # onto Node 20 jobs, but pnpm 9.15+ (installed below) has
          # some churn on Node 24. Pin to 22 LTS for stability.
          node-version: 22
        # NOTE: cache: pnpm removed — setup-node@v4 invokes
        # `pnpm store path` which pnpm 9.x breaks with
        # "ERROR packages field missing or empty". Use the
        # explicit actions/cache@v4 below instead.

      # Cache pnpm store across runs by content hash of pnpm-lock.yaml.
      # Mirrors what `cache: pnpm` used to do, but with the storage-path
      # explicit so pnpm never has to run before the cache is created.
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      # Cache the Rust workspace across runs. Saves ~3 min on warm cache.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      # Linux: Tauri needs the webkit2gtk-4.1 / GTK 3 stack + librsvg
      # (for icon embedding) + patchelf (rpath rewriting for AppImage).
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file

      # Windows: NSIS produces the .exe installer, wget downloads the
      # linuxdeploy-style helpers Tauri shells out to.
      - name: Install Windows build dependencies
        if: matrix.os == 'windows-latest'
        shell: cmd
        run: |
          choco install -y nsis wget --no-progress || choco install -y nsis --no-progress

      - name: Install dependencies and build
        run: |
          pnpm install --frozen-lockfile
          pnpm tauri build

      # v0.2.6 release fix: rename the Apple-Silicon dmg from
      # `_aarch64.dmg` to `_arm64.dmg` so end users see the
      # Apple-marketing name in the GitHub Release. Tauri 2 derives
      # the suffix from the Rust target triple (`aarch64-apple-darwin`
      # → `aarch64`), which is technically correct but unfamiliar to
      # Apple users. `arm64` matches Apple's documentation, and
      # makes the "this won't run on Intel" implication obvious.
      # Only fires on macos-latest since macOS is the only platform
      # whose bundler appends an arch suffix.
      - name: Rename dmg aarch64 → arm64
        if: matrix.os == 'macos-latest'
        run: |
          cd src-tauri/target/release/bundle/dmg
          shopt -s nullglob
          for f in *_aarch64.dmg; do
            mv "$f" "${f/_aarch64.dmg/_arm64.dmg}"
          done
          ls -la

      # Tauri writes bundle artifacts under src-tauri/target/release/bundle/.
      # Globs are matrix-specific (.deb/.AppImage on Linux, .dmg on macOS,
      # .msi/.exe on Windows) so we don't pollute each runner's release with
      # unsupported targets.
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bettercursor-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # softprops 默认从 github.ref_name 读 tag, 但 workflow_dispatch
          # 触发时 ref_name 是 main 而不是 tag — 显式 hardcode v0.2.6
          # (跟当前 release 对齐, 等下个 tag 时跟改 tag_name 即可).
          tag_name: v0.2.6
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
